# BahaAI — one-command Docker setup.
#
#   Students only need Docker Desktop installed. Then:
#
#       docker compose up --build
#
#   ...and open http://localhost:8000  (login: admin@bahaai.test / password)
#
# Everything (PHP, PostgreSQL, compiled frontend, migrations, demo data)
# is handled automatically inside the containers.

services:
  # ---------- Laravel application ----------
  app:
    build:
      context: .
    image: baha-ai:latest
    ports:
      - "8000:8000"
    environment:
      APP_NAME: BahaAI
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000

      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: baha_ai
      DB_USERNAME: baha
      DB_PASSWORD: secret

      # Optional: paste an OpenWeatherMap key to get live weather.
      # Leave blank to use realistic simulated weather.
      OPENWEATHERMAP_API_KEY: "${OPENWEATHERMAP_API_KEY:-}"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # ---------- PostgreSQL database ----------
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: baha_ai
      POSTGRES_USER: baha
      POSTGRES_PASSWORD: secret
    volumes:
      - baha_dbdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U baha -d baha_ai"]
      interval: 5s
      timeout: 5s
      retries: 12
    restart: unless-stopped

volumes:
  baha_dbdata:
