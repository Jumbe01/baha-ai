# BahaAI — one-command Docker setup.
#
#   Students only need Docker Desktop installed. Then:
#
#       docker compose up --build
#
#   ...and open http://localhost:8000  (login: admin@bahaai.test / password)
#   Email inbox (Mailpit): http://localhost:8025
#
# Everything (PHP, PostgreSQL, compiled frontend, migrations, demo data)
# is handled automatically inside the containers.
#
# ---------------------------------------------------------------------------
# CONFIGURATION (optional)
# ---------------------------------------------------------------------------
# All settings below have sensible defaults, so it works with zero setup.
# To change any of them (e.g. add a weather API key or change the port),
# copy `.env.docker.example` to `.env` and edit it:
#
#       cp .env.docker.example .env       (macOS/Linux)
#       copy .env.docker.example .env     (Windows)
#
# Docker Compose automatically reads that `.env` file.
# ---------------------------------------------------------------------------

services:
  # ---------- Laravel application ----------
  app:
    build:
      context: .
    image: baha-ai:latest
    ports:
      # Host port (left) can be changed via APP_PORT; container port is fixed.
      - "${APP_PORT:-8000}:8000"
    environment:
      APP_NAME: "${APP_NAME:-BahaAI}"
      APP_ENV: "${APP_ENV:-local}"
      APP_DEBUG: "${APP_DEBUG:-true}"
      APP_URL: "${APP_URL:-http://localhost:8000}"

      # Database — HOST/PORT/driver are fixed to the internal Docker network.
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: "${DB_DATABASE:-baha_ai}"
      DB_USERNAME: "${DB_USERNAME:-baha}"
      DB_PASSWORD: "${DB_PASSWORD:-secret}"

      # Optional: paste an OpenWeatherMap key to get live weather.
      # Leave blank to use realistic simulated weather.
      OPENWEATHERMAP_API_KEY: "${OPENWEATHERMAP_API_KEY:-}"

      # Mail — captured by the bundled Mailpit container (no real emails sent).
      # View every email the app sends at http://localhost:8025
      MAIL_MAILER: smtp
      MAIL_HOST: mailpit
      MAIL_PORT: 1025
      MAIL_FROM_ADDRESS: "${MAIL_FROM_ADDRESS:-alerts@bahaai.test}"
      MAIL_FROM_NAME: "${APP_NAME:-BahaAI}"
    depends_on:
      db:
        condition: service_healthy
      mailpit:
        condition: service_started
    restart: unless-stopped

  # ---------- PostgreSQL database ----------
  db:
    image: postgres:16-alpine
    environment:
      # Kept in sync with the app service via the same variables.
      POSTGRES_DB: "${DB_DATABASE:-baha_ai}"
      POSTGRES_USER: "${DB_USERNAME:-baha}"
      POSTGRES_PASSWORD: "${DB_PASSWORD:-secret}"
    volumes:
      - baha_dbdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-baha} -d ${DB_DATABASE:-baha_ai}"]
      interval: 5s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  # ---------- Mailpit (email capture) ----------
  # Catches all outgoing email. Nothing is sent to real inboxes.
  # Web inbox:  http://localhost:8025
  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "${MAILPIT_UI_PORT:-8025}:8025"   # Web UI
      - "${MAILPIT_SMTP_PORT:-1025}:1025" # SMTP
    restart: unless-stopped

volumes:
  baha_dbdata:
